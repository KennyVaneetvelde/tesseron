<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tesseron - How the pieces fit together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060a13; padding: 0; }
    #frame {
      width: 1240px;
      background: linear-gradient(180deg, #0e1526 0%, #0b1220 100%);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .caption {
      text-align: center;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #94a3b8;
      margin-top: 14px;
    }
    svg.dgm-svg { display: block; margin: 0 auto; }

    .dgm-title { font-family: Inter, "Segoe UI", system-ui, sans-serif; font-weight: 600; font-size: 13.5px; letter-spacing: 0.08em; fill: #e2e8f0; }
    .dgm-title-accent { fill: #fcd34d; }
    .dgm-sub { font-family: Inter, "Segoe UI", system-ui, sans-serif; font-weight: 400; font-size: 12.5px; fill: #94a3b8; }
    .dgm-sub-accent { fill: #fcd34d; opacity: 0.9; }
    .dgm-code { font-family: "JetBrains Mono", ui-monospace, Consolas, monospace; font-weight: 400; font-size: 11.5px; fill: #94a3b8; }
    .dgm-code-accent { fill: #fcd34d; }
    .dgm-lbl { font-family: Inter, "Segoe UI", system-ui, sans-serif; font-weight: 500; font-size: 12px; letter-spacing: 0.02em; fill: #cbd5e1; }
    .dgm-lbl-accent { fill: #fcd34d; }
    .dgm-icon { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; stroke: #94a3b8; }
    .dgm-icon-accent { stroke: #f59e0b; }
  </style>
</head>
<body>
  <div id="frame">
    <svg class="dgm-svg" viewBox="0 0 1200 290" width="1200" height="290" role="img" aria-label="How Tesseron pieces fit together: user, your app, MCP gateway, and MCP client connected by WebSocket and MCP stdio.">
      <defs>
        <pattern id="dgm-dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1.2" cy="1.2" r="1.2" fill="rgba(51,65,85,0.55)"/>
        </pattern>
        <linearGradient id="dgm-card-neutral" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#172033"/>
          <stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
        <linearGradient id="dgm-card-accent" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2a1f0a"/>
          <stop offset="1" stop-color="#1c1407"/>
        </linearGradient>
        <linearGradient id="dgm-border-accent" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fcd34d"/>
          <stop offset="1" stop-color="#d97706"/>
        </linearGradient>
        <filter id="dgm-glow-accent" x="-30%" y="-60%" width="160%" height="220%">
          <feGaussianBlur stdDeviation="14" result="b"/>
          <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.98  0 0 0 0 0.73  0 0 0 0 0.14  0 0 0 0.45 0"/>
        </filter>
        <filter id="dgm-shadow" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
          <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.22"/>
        </filter>
      </defs>

      <rect width="100%" height="100%" fill="url(#dgm-dots)"/>

      <ellipse cx="760" cy="150" rx="130" ry="80" fill="#f59e0b" filter="url(#dgm-glow-accent)" opacity="0.33"/>

      <line x1="216" y1="150" x2="334" y2="150" stroke="#cbd5e1" stroke-width="1.75" stroke-linecap="butt"/>
      <polygon points="334,145 344,150 334,155" fill="#cbd5e1"/>

      <polygon points="546,145 536,150 546,155" fill="#f59e0b"/>
      <line x1="546" y1="150" x2="654" y2="150" stroke="#f59e0b" stroke-width="1.75" stroke-linecap="butt"/>
      <polygon points="654,145 664,150 654,155" fill="#f59e0b"/>

      <polygon points="866,145 856,150 866,155" fill="#f59e0b"/>
      <line x1="866" y1="150" x2="974" y2="150" stroke="#f59e0b" stroke-width="1.75" stroke-linecap="butt"/>
      <polygon points="974,145 984,150 974,155" fill="#f59e0b"/>

      <g>
        <rect x="30" y="90" width="180" height="120" rx="14" fill="url(#dgm-card-neutral)" stroke="#334155" stroke-width="1.25" filter="url(#dgm-shadow)"/>
        <g class="dgm-icon" transform="translate(110,106)">
          <circle cx="10" cy="7" r="3.6"/>
          <path d="M3 20 a7 7 0 0 1 14 0"/>
        </g>
        <text x="120" y="150" text-anchor="middle" class="dgm-title">USER</text>
        <text x="120" y="174" text-anchor="middle" class="dgm-sub">prompts the</text>
        <text x="120" y="190" text-anchor="middle" class="dgm-sub">agent</text>
      </g>

      <g>
        <rect x="350" y="90" width="180" height="120" rx="14" fill="url(#dgm-card-neutral)" stroke="#334155" stroke-width="1.25" filter="url(#dgm-shadow)"/>
        <g class="dgm-icon" transform="translate(430,106)">
          <rect x="1" y="2" width="18" height="16" rx="2"/>
          <path d="M1 6 H19"/>
          <circle cx="4" cy="4" r="0.7" fill="#94a3b8" stroke="none"/>
          <circle cx="7" cy="4" r="0.7" fill="#94a3b8" stroke="none"/>
        </g>
        <text x="440" y="150" text-anchor="middle" class="dgm-title">YOUR APP</text>
        <text x="440" y="174" text-anchor="middle" class="dgm-sub">browser or node</text>
        <text x="440" y="194" text-anchor="middle" class="dgm-code">@tesseron/web | /server</text>
      </g>

      <g>
        <rect x="670" y="90" width="180" height="120" rx="14" fill="url(#dgm-card-accent)" stroke="url(#dgm-border-accent)" stroke-width="1.25" filter="url(#dgm-shadow)"/>
        <g class="dgm-icon dgm-icon-accent" transform="translate(750,106)">
          <path d="M3 7 H17"/>
          <path d="M14 4 L18 7 L14 10"/>
          <path d="M17 13 H3"/>
          <path d="M6 10 L2 13 L6 16"/>
        </g>
        <text x="760" y="150" text-anchor="middle" class="dgm-title dgm-title-accent">MCP GATEWAY</text>
        <text x="760" y="174" text-anchor="middle" class="dgm-sub dgm-sub-accent">bridges WS to MCP</text>
        <text x="760" y="194" text-anchor="middle" class="dgm-code dgm-code-accent">@tesseron/mcp :7475</text>
      </g>

      <g>
        <rect x="990" y="90" width="180" height="120" rx="14" fill="url(#dgm-card-neutral)" stroke="#334155" stroke-width="1.25" filter="url(#dgm-shadow)"/>
        <g class="dgm-icon" transform="translate(1070,106)">
          <path d="M10 1.5 L12 8 L18.5 10 L12 12 L10 18.5 L8 12 L1.5 10 L8 8 Z"/>
        </g>
        <text x="1080" y="150" text-anchor="middle" class="dgm-title">MCP CLIENT</text>
        <text x="1080" y="174" text-anchor="middle" class="dgm-sub">Claude Code,</text>
        <text x="1080" y="190" text-anchor="middle" class="dgm-sub">Desktop, Cursor</text>
      </g>

      <g>
        <rect x="556" y="139" width="88" height="22" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
        <text x="600" y="154" text-anchor="middle" class="dgm-lbl dgm-lbl-accent">WebSocket</text>
      </g>
      <g>
        <rect x="876" y="139" width="88" height="22" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
        <text x="920" y="154" text-anchor="middle" class="dgm-lbl dgm-lbl-accent">MCP stdio</text>
      </g>
    </svg>
    <div class="caption">The MCP gateway is the bridge. Your app speaks WebSocket to it; the MCP client speaks stdio to it.</div>
  </div>
</body>
</html>
