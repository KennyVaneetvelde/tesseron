name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"

      # Trusted publishing OIDC for the actual `npm publish` PUT requires
      # npm >= 11.5.1. Node 20 ships npm 10.x which only does OIDC for
      # provenance signing — the publish itself falls back to bearer-token
      # auth, hits an empty NODE_AUTH_TOKEN, and returns E404.
      - name: Upgrade npm to a version with trusted-publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter "@tesseron/*" --filter "!@tesseron/devtools" --filter "!@tesseron/docs" build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # `changeset version` re-expands short JSON arrays onto multiple lines,
          # which the repo's Biome formatter then rejects on the release PR's CI.
          # Running `biome format --write` afterwards re-inlines them.
          version: pnpm version-packages
          publish: pnpm changeset publish
          createGithubReleases: true
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Trusted publishing is configured on npmjs.com for every @tesseron/*
          # package; the OIDC token from `id-token: write` is the auth path.
          # NODE_AUTH_TOKEN must NOT be set — when both are present npm prefers
          # the legacy token and (if it has been revoked or rotated away) fails
          # the publish with E404 even though provenance signing succeeded.
          NPM_CONFIG_PROVENANCE: "true"
