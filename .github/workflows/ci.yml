name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      # Plugin manifest version must match @tesseron/mcp's version. Run after
      # tests so the cheap fail signals (typecheck, lint) surface first.
      - name: Verify plugin manifests in sync with @tesseron/mcp
        run: pnpm sync-plugin-version --check

      # Plugin bundle under `plugin/server/` is the actual gateway shipped to
      # Claude Code installs. Rebuild from current source and assert nothing
      # changed — catches the failure mode where someone bumps the version
      # but forgets to rebuild the bundle, so users still run cached old code
      # under a fresh manifest. Diffs the whole `plugin/server/` directory so
      # any future sibling artifact (sourcemap, .d.ts) is covered too.
      - name: Verify plugin bundle is up to date
        run: |
          pnpm build:plugin
          if ! git diff --exit-code plugin/server/; then
            echo "::error::plugin/server/ is stale; run 'pnpm build:plugin' and commit the result"
            exit 1
          fi
