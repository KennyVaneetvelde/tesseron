name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      # The plugin manifest version, the marketplace listing version, and the
      # @tesseron/mcp / @tesseron/docs-mcp version pins inside plugin/.mcp.json
      # must all match @tesseron/mcp's package.json version. Run after tests so
      # the cheap fail signals (typecheck, lint) surface first.
      - name: Verify plugin manifests in sync with @tesseron/mcp
        run: pnpm sync-plugin-version --check
