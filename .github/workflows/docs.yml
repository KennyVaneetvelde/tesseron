name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Re-deploy weekly so the "last updated" timestamp stays honest even if
  # nothing changed.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one production deploy at a time. Newer pushes cancel in-flight runs;
# any run that already published is left alone.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build Starlight
        working-directory: docs
        env:
          DOCS_SITE: https://kennyvaneetvelde.github.io
          DOCS_BASE: /tesseron
        run: pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
